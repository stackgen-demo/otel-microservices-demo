apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "frontend-proxy-service.fullname" . }}-envoy-config
  labels:
    app.kubernetes.io/name: {{ include "frontend-proxy-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  envoy.yaml: |
    static_resources:
      listeners:
        - address:
            socket_address:
              address: "0.0.0.0"
              port_value: 8080
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    codec_type: AUTO
                    stat_prefix: ingress_http
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: frontend
                          domains:
                            - "*"
                          routes:
                            - match: { path: "/loadgen" }
                              redirect: { path_redirect: "/loadgen/" }
                            - match: { prefix: "/loadgen/" }
                              route: { cluster: loadgen, prefix_rewrite: "/" }
                            - match: { prefix: "/otlp-http/" }
                              route: { cluster: opentelemetry_collector_http, prefix_rewrite: "/" }
                            - match: { path: "/jaeger" }
                              redirect: { path_redirect: "/jaeger/" }
                            - match: { prefix: "/jaeger/" }
                              route: { cluster: jaeger }
                            - match: { path: "/grafana" }
                              redirect: { path_redirect: "/grafana/" }
                            - match: { prefix: "/grafana/" }
                              route: { cluster: grafana }
                            - match: { prefix: "/images/" }
                              route: { cluster: image-provider, prefix_rewrite: "/" }
                            - match: { prefix: "/api/cart" }
                              route: { cluster: cart, prefix_rewrite: "/" }
                            - match: { prefix: "/flagservice/" }
                              route: { cluster: flagservice, prefix_rewrite: "/", timeout: 0s }
                            - match: { prefix: "/feature" }
                              route:
                                cluster: flagd-ui
                                prefix_rewrite: "/"
                                upgrade_configs:
                                  - upgrade_type: websocket
                            - match: { prefix: "/" }
                              route: { cluster: frontend }
                    http_filters:
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: opentelemetry_collector_grpc
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: opentelemetry_collector_grpc
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.OTEL_COLLECTOR_NAME }}
                          port_value: 4317
        - name: opentelemetry_collector_http
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: opentelemetry_collector_http
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.OTEL_COLLECTOR_NAME }}
                          port_value: 4318
        - name: frontend
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: frontend
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.FRONTEND_HOST }}
                          port_value: {{ .Values.env.FRONTEND_PORT | int }}
        - name: cart
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: cart
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.CART_HOST }}
                          port_value: {{ .Values.env.CART_PORT | int }}
        - name: image-provider
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: image-provider
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.IMAGE_PROVIDER_HOST }}
                          port_value: {{ .Values.env.IMAGE_PROVIDER_PORT | int }}
        - name: flagservice
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: flagservice
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.FLAGD_HOST }}
                          port_value: {{ .Values.env.FLAGD_PORT | int }}
        - name: flagd-ui
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: flagd-ui
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.FLAGD_UI_HOST }}
                          port_value: {{ .Values.env.FLAGD_UI_PORT | int }}
        - name: loadgen
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: loadgen
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.LOCUST_WEB_HOST }}
                          port_value: {{ .Values.env.LOCUST_WEB_PORT | int }}
        - name: grafana
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: grafana
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.GRAFANA_HOST }}
                          port_value: {{ .Values.env.GRAFANA_PORT | int }}
        - name: jaeger
          type: STRICT_DNS
          lb_policy: ROUND_ROBIN
          load_assignment:
            cluster_name: jaeger
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: {{ .Values.env.JAEGER_HOST }}
                          port_value: {{ .Values.env.JAEGER_UI_PORT | int }}
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000

