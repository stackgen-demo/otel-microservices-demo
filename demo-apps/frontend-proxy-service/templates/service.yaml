apiVersion: v1
kind: Service
metadata:
  name: frontend-proxy
  labels:
    app.kubernetes.io/name: {{ include "frontend-proxy-service.name" . }}
    app.kubernetes.io/component: frontend-proxy
spec:
  type: ClusterIP
  ports:
    - port: 8080
      name: tcp-service
      targetPort: service
  selector:
    app.kubernetes.io/component: frontend-proxy
