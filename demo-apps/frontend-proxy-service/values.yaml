replicaCount: 1

image:
  repository: ghcr.io/open-telemetry/demo
  tag: "2.1.3-frontend-proxy"
  pullPolicy: IfNotPresent

serviceAccount:
  name: opentelemetry-demo

env:
  OTEL_COLLECTOR_NAME: "otel-collector.devopsnow.svc.cluster.local"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  ENVOY_ADDR: "0.0.0.0"
  ENVOY_PORT: "8080"
  ENVOY_ADMIN_PORT: "10000"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
  FLAGD_UI_HOST: "flagd-ui"
  FLAGD_UI_PORT: "4000"
  FRONTEND_HOST: "frontend"
  FRONTEND_PORT: "8080"
  GRAFANA_HOST: "grafana"
  GRAFANA_PORT: "80"
  IMAGE_PROVIDER_HOST: "image-provider"
  IMAGE_PROVIDER_PORT: "8081"
  CART_HOST: "cart"
  CART_PORT: "8080"
  JAEGER_HOST: "jaeger-query"
  JAEGER_UI_PORT: "16686"
  LOCUST_WEB_HOST: "load-generator"
  LOCUST_WEB_PORT: "8089"
  OTEL_COLLECTOR_HOST: "$(OTEL_COLLECTOR_NAME)"
  OTEL_COLLECTOR_PORT_GRPC: "4317"
  OTEL_COLLECTOR_PORT_HTTP: "4318"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3"
