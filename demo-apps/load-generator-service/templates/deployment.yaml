apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "load-generator-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "load-generator-service.name" . }}
    app.kubernetes.io/component: load-generator
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: load-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/component: load-generator
        app.kubernetes.io/name: {{ include "load-generator-service.name" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: load-generator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8089
              name: service
          env:
            # Dynamic Service name from metadata.label
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            # Direct env from values.yaml (loop)
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}

