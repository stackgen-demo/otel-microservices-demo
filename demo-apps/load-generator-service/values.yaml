replicaCount: 1

image:
  repository: ghcr.io/open-telemetry/demo
  tag: "2.1.3-load-generator"
  pullPolicy: IfNotPresent

serviceAccount:
  name: opentelemetry-demo

env:
  OTEL_COLLECTOR_NAME: "otel-collector.devopsnow.svc.cluster.local"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  LOCUST_WEB_HOST: "0.0.0.0"
  LOCUST_WEB_PORT: "8089"
  LOCUST_USERS: "10"
  LOCUST_SPAWN_RATE: "1"
  LOCUST_HOST: "http://frontend-proxy:8080"
  LOCUST_HEADLESS: "false"
  LOCUST_AUTOSTART: "true"
  LOCUST_BROWSER_TRAFFIC_ENABLED: "true"
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: "python"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
  FLAGD_OFREP_PORT: "8016"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://$(OTEL_COLLECTOR_NAME):4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3"

