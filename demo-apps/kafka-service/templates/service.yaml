apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: {{ include "kafka-service.name" . }}
    app.kubernetes.io/component: kafka
spec:
  type: ClusterIP
  ports:
    - port: 9092
      targetPort: plaintext
      protocol: TCP
      name: plaintext
    - port: 9093
      targetPort: controller
      protocol: TCP
      name: controller
  selector:
    app.kubernetes.io/component: kafka

