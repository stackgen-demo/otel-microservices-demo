apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: {{ include "frontend-service.name" . }}
    app.kubernetes.io/component: frontend
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: demo-store.stackgen.com
      http:
        paths:
          - path: /frontend
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 8080
