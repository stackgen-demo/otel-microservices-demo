replicaCount: 1

image:
  repository: ghcr.io/open-telemetry/demo
  tag: "2.1.3-frontend"
  pullPolicy: IfNotPresent

serviceAccount:
  name: opentelemetry-demo

env:
  OTEL_COLLECTOR_NAME: "otel-collector.devopsnow.svc.cluster.local"
  OTEL_LOGS_EXPORTER: "none"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  FRONTEND_PORT: "8080"
  PORT: "$(FRONTEND_PORT)"
  FRONTEND_ADDR: ":8080"
  AD_ADDR: "ad:8080"
  CART_ADDR: "cart:8080"
  CHECKOUT_ADDR: "checkout:8080"
  CURRENCY_ADDR: "currency:8080"
  PRODUCT_CATALOG_ADDR: "product-catalog:8080"
  RECOMMENDATION_ADDR: "recommendation:8080"
  SHIPPING_ADDR: "http://shipping:8080"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
  ENV_PLATFORM: "kubernetes"
  OTEL_COLLECTOR_HOST: "$(OTEL_COLLECTOR_NAME)"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://$(OTEL_COLLECTOR_NAME):4317"
  WEB_OTEL_SERVICE_NAME: "frontend-web"
  PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://localhost:8080/otlp-http/v1/traces"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3"
