apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "recommendation-service.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "recommendation-service.name" . }}
    app.kubernetes.io/component: recommendation
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: recommendation
  template:
    metadata:
      labels:
        app.kubernetes.io/component: recommendation
        app.kubernetes.io/name: {{ include "recommendation-service.name" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: recommendation
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: service
          env:
            # Dynamic Service name from metadata.label
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.labels['app.kubernetes.io/component']
            # Direct env from values.yaml (loop)
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}

