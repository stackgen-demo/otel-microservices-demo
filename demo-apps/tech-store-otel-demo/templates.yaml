# loadgenerator
apiVersion: batch/v1
kind: CronJob
metadata:
  name: load-generator
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            machine-type: amd64
          containers:
          - name: load-generator
            image: curlimages/curl
            command: ["sh", "-c"]
            args:
            - |
              #!/bin/sh
              for n in {1..3};
              do
                MINWAIT=2
                MAXWAIT=10
                sleep $((MINWAIT + RANDOM % (MAXWAIT - MINWAIT)))
                
                # Generate random user name
                random_user_name=$(cat /dev/urandom | tr -dc 'a-zA-Z0-9' | fold -w 8 | head -n 1)
                
                # Generate random account type
                account_type=$(shuf -n 1 -e "savings" "current")
                
                # Generate random amount
                random_amount=$((RANDOM % (20000 - 10000 + 1) + 10000))
                
                # Randomly decide to generate a 5XX error
                generate_error=$((RANDOM % 10))
                
                if [ $generate_error -lt 2 ]; then
                    echo "Simulating 5XX error for user creation service"
                    curl_output="HTTP/1.1 500 Internal Server Error"
                else
                    # Call user creation service
                    echo "Calling user creation service with USER_NAME: $random_user_name, ACCOUNT: $account_type"
                    if curl_output=$(curl -X POST http://user-service.opsverse-demo.svc.cluster.local:8081/user/create -H "Content-Type: application/json" -d "{\"USER_NAME\": \"$random_user_name\", \"ACCOUNT\": \"$account_type\"}"); then
                        echo "User creation successful: $curl_output"
                    else
                        echo "Error creating user: $curl_output"
                    fi
                fi

                user_id=$(echo $curl_output | grep -o '"ID":[0-9]*' | awk -F':' '{print $2}')
                echo "Captured User ID: $user_id"
                
                generate_error=$((RANDOM % 10))
                
                if [ $generate_error -lt 2 ]; then
                    echo "Simulating 5XX error for payment transfer service"
                    curl_output="HTTP/1.1 500 Internal Server Error"
                else
                    # Call payment transfer service
                    echo "Calling payment transfer service with USER_ID: $user_id, AMOUNT: $random_amount"
                    if curl_output=$(curl -X GET http://payment-service.opsverse-demo.svc.cluster.local:8080/payment/transfer/id/$user_id?amount=$random_amount -H "Content-Type: application/json"); then
                        echo "Payment transfer successful: $curl_output"
                    else
                        echo "Error transferring payment: $curl_output"
                    fi
                fi
                
                # Determine product name and price
                case $((RANDOM % 3)) in
                    0)
                        product_name="Samsung Galaxy S21"
                        price="999"
                        ;;
                    1)
                        product_name="Nothing Phone 2"
                        price="1100"
                        ;;
                    2)
                        product_name="iPhone 14 Pro"
                        price="599"
                        ;;
                    *)
                        echo "Unexpected product index"
                        exit 1
                        ;;
                esac
                
                generate_error=$((RANDOM % 10))
                
                if [ $generate_error -lt 2 ]; then
                    echo "Simulating 5XX error for order creation service"
                    curl_output="HTTP/1.1 500 Internal Server Error"
                else
                    # Call order creation service
                    echo "Calling order creation service with USER_ID: $user_id, PRODUCT_NAME: $product_name, PRICE: $price"
                    if curl_output=$(curl -X POST http://order-service.opsverse-demo.svc.cluster.local:8082/order/create -H "Content-Type: application/json" -d "{\"USER_ID\": $user_id, \"PRODUCT_NAME\": \"$product_name\", \"PRICE\": \"$price\"}"); then
                        echo "Order creation successful: $curl_output"
                    else
                        echo "Error creating order: $curl_output"
                    fi
                fi
              done
            volumeMounts:
            - name: data
              mountPath: /data
          restartPolicy: OnFailure
          volumes:
          - name: data
            emptyDir: {}