replicaCount: 1

  image:
  repository: ghcr.io/open-feature/flagd
  tag: "v0.12.8"
  pullPolicy: IfNotPresent

serviceAccount:
  name: opentelemetry-demo

command:
  - /flagd-build
  - start
  - --port
  - "8013"
  - --ofrep-port
  - "8016"
  - --uri
  - file:./etc/flagd/demo.flagd.json

ports:
  - containerPort: 8013
    name: rpc
  - containerPort: 8016
    name: ofrep

env:
  OTEL_COLLECTOR_NAME: "otel-collector"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  FLAGD_METRICS_EXPORTER: "otel"
  FLAGD_OTEL_COLLECTOR_URI: "$(OTEL_COLLECTOR_NAME):4317"
  GOMEMLIMIT: "60MiB"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=$(OTEL_SERVICE_NAME),service.namespace=opentelemetry-demo,service.version=2.1.3"
