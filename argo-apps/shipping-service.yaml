apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shipping-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/stackgen-demo/otel-microservices-demo.git
    targetRevision: HEAD
    path: demo-apps/shipping-service
  destination:
    server: https://kubernetes.default.svc
    namespace: opsverse-demo
  syncPolicy:
    automated:
      prune: true
    syncOptions:
    - Validate=false
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
